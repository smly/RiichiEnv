<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Customization Demo</title>
<style>
  body { margin: 0; background: #111; color: #fff; font-family: sans-serif; }
  #viewer { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="viewer"></div>
<script src="dist/viewer.js"></script>
<script>
  if (typeof RiichiViewer === 'undefined') {
    document.getElementById('viewer').textContent = 'Error: RiichiViewer not loaded. Check console.';
  } else {
    fetch('example_after_injection.jsonl')
      .then(r => {
        if (!r.ok) throw new Error('Failed to fetch JSONL: ' + r.status);
        return r.text();
      })
      .then(text => {
        const log = text.trim().split('\n').map(line => JSON.parse(line));
        RiichiViewer.mount('#viewer', {
          log: log,
          renderer: '3d',
          players: [
            { name: 'smlybot0', avatarUrl: 'https://avatars.githubusercontent.com/u/19337?v=4' },
            { name: 'smlybot1', avatarUrl: 'https://avatars.githubusercontent.com/u/19337?v=4' },
            { name: 'smlybot2', avatarUrl: 'https://avatars.githubusercontent.com/u/19337?v=4' },
            { name: 'smlybot3', avatarUrl: 'https://avatars.githubusercontent.com/u/19337?v=4' },
          ],
        });
      })
      .catch(err => {
        document.getElementById('viewer').textContent = 'Error: ' + err.message;
        console.error(err);
      });
  }
</script>
</body>
</html>
